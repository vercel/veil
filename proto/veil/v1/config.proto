syntax = "proto3";

package veil.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";

// VeilConfigDefinition is the contents of .veil/veil.json — the
// hand-authored source-side project configuration. The "Definition"
// suffix marks it as a local-file shape; types under registry.proto
// (Kind, Registry, …) are the corresponding published forms.
message VeilConfigDefinition {
  // Relative or absolute paths to kind definition files.
  repeated string kinds = 1 [
    (buf.validate.field).repeated.min_items = 1,
    (buf.validate.field).repeated.items.string.min_len = 1
  ];

  // User-defined input variables keyed by name. Values are provided at
  // render time via --var flags or VEIL_VAR_<NAME> environment variables.
  map<string, Variable> variables = 2 [(buf.validate.field).map.keys.string.pattern = "^[a-zA-Z_][a-zA-Z0-9_]*$"];

  // Aliased registry sources keyed by alias. The empty-string alias
  // (`""`) is the default registry: kind references with no `<alias>/`
  // prefix resolve there. Named aliases can be any string and are used
  // verbatim in references — declaring
  // `"acme": "./vendor/acme/registry.json"` lets resources reference
  // its kinds as `acme/<kind>`. The `@`-prefixed convention (e.g.
  // `"@scope": "..."` referenced as `@scope/<kind>`) is supported but
  // not required — the alias is treated as opaque text. Values are
  // paths to compiled registry.json files (or URLs, when the loader
  // supports them).
  map<string, string> registries = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).map.keys.string.pattern = "^([^.:/][^:/]*)?$"
  ];

  // Where to find the resource JSON files that make up the project's
  // catalog. Used at render time to resolve dependency targets.
  ResourceDiscovery resource_discovery = 4;
}

// ResourceDiscovery declares how `veil render` builds its catalog of
// resources for dependency resolution. Each path is a glob expression
// (`**` matches across directory boundaries via the doublestar library)
// pointing at the JSON files that should be indexed. Relative patterns
// resolve against the veil.json directory.
message ResourceDiscovery {
  // Glob patterns identifying resource JSON files. Files that don't
  // parse as a Resource shape (overlays, fragments, schemas) are
  // skipped silently; duplicate (kind, name) pairs across matches are
  // rejected.
  repeated string paths = 1 [(buf.validate.field).repeated.items.string.min_len = 1];
}

// VariableType is a wrapper message that holds the Variable.type enum.
// Wrapping it in a message gives the Go-generated identifiers a clean
// nested form (VariableType_Enum_*) and lets the JSON wire format use
// lowercase value names ("string", "number", "bool") that match the
// veil.json shape users have been writing since day one.
message VariableType {
  // Enum is the set of legal types for a declared variable. Values are
  // intentionally lowercase to preserve the existing JSON wire format —
  // protojson serializes enum values as their declared identifier, so
  // anything else would change every veil.json on disk.
  //
  // buf:lint:ignore ENUM_VALUE_UPPER_SNAKE_CASE
  // buf:lint:ignore ENUM_VALUE_PREFIX
  // buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
  enum Enum {
    // buf:lint:ignore ENUM_VALUE_UPPER_SNAKE_CASE
    // buf:lint:ignore ENUM_VALUE_PREFIX
    // buf:lint:ignore ENUM_ZERO_VALUE_SUFFIX
    unspecified = 0;
    // buf:lint:ignore ENUM_VALUE_UPPER_SNAKE_CASE
    // buf:lint:ignore ENUM_VALUE_PREFIX
    string = 1;
    // buf:lint:ignore ENUM_VALUE_UPPER_SNAKE_CASE
    // buf:lint:ignore ENUM_VALUE_PREFIX
    number = 2;
    // buf:lint:ignore ENUM_VALUE_UPPER_SNAKE_CASE
    // buf:lint:ignore ENUM_VALUE_PREFIX
    bool = 3;
  }
}

// Variable declares a named input available to overlay regex matches
// (and to hooks via the render context). Lives in both the local
// VeilConfigDefinition and the published Kind (carried verbatim
// through compilation), so it has no Definition suffix — the same
// shape applies in both contexts.
message Variable {
  // Declared type. Must be one of the legal VariableType.Enum values
  // (the `unspecified` zero is rejected at load time).
  VariableType.Enum type = 1 [(buf.validate.field).enum.defined_only = true];

  // Optional default. If omitted, the variable is required at render time.
  // Must be a scalar matching the declared type.
  optional google.protobuf.Value default = 2;

  // Optional human-readable description. Rendered as a JSDoc comment on
  // the field in the generated veil-types.ts RegistryVariables interface
  // so hook authors get inline documentation at their IDE cursor.
  optional string description = 3;

  // Optional set of permitted values. Only valid for `string` and `number`
  // types. When present, the generated TypeScript field becomes a union
  // ("a" | "b" | "c") instead of the broad scalar type, and values
  // supplied via --var or VEIL_VAR_* are rejected at render time unless
  // they match one of the listed entries.
  repeated google.protobuf.Value enum = 4;
}

// KindDefinition is a hand-authored kind.json — the source-side shape
// that `veil build` compiles into a published Kind (registry.proto).
message KindDefinition {
  // The name of this kind (e.g. "service", "cron"). Must start with a
  // lowercase letter and contain only lowercase letters, digits, `-`,
  // and `_` — the same convention enforced by `veil new kind`.
  string name = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][a-z0-9_-]*$",
    (buf.validate.field).required = true
  ];

  // Source configuration files that make up the kind. May be empty —
  // a kind with no sources is valid (it's the bare template plus
  // whatever its hooks add at render time).
  repeated string sources = 2 [(buf.validate.field).repeated.items.string.min_len = 1];

  // Hook code files grouped by lifecycle point. The dependents block —
  // the per-consumer hooks that fire when another kind declares a
  // dependency on this one — also lives under `hooks`, since it is
  // ultimately just another hook lifecycle.
  HooksDefinition hooks = 3;

  // Path to the JSON Schema that defines the spec shape.
  string schema = 5;
}

// HooksDefinition groups a kind's hook files by lifecycle point. Each
// field is an ordered list; the order determines invocation order at
// that lifecycle point. Additional lifecycle points will be added as
// fields on this message so the kind.json shape can extend without
// breaking changes.
message HooksDefinition {
  // Hooks run during `veil render` (each exports a Hook whose optional
  // `renderHook(ctx, fs)` transforms the bundle). Each entry is an
  // object with a required `path` plus optional `access` declaring the
  // host resources the hook may read.
  repeated RenderHookDefinition render = 1;

  // Per-consumer dependent hooks. Each entry binds a consumer kind to
  // hook(s) that run when a resource of that kind declares a
  // dependency on this one, plus the params schema the consumer must
  // supply. See SPEC.md "Dependencies" for the full design.
  repeated DependentDefinition dependents = 2;
}

// RenderHookDefinition is a single render-hook entry in kind.json: a
// path to the hook source file plus optional `access` declaring the
// host resources the hook may read.
message RenderHookDefinition {
  // Path to the hook source file. Resolved relative to the enclosing
  // kind.json file.
  string path = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];

  // Optional declaration of host resources this hook needs (env vars,
  // and eventually filesystem / network as they're added).
  HookAccess access = 2;
}

// HookAccess declares the host resources a hook is allowed to reach. The
// runner enforces these at render time: required env vars must be
// present on the host, and the hook receives only what it declared.
message HookAccess {
  // Environment variables the hook intends to read. Each entry must
  // describe both the name and why it's needed; the description is
  // surfaced in pre-flight error messages when the var is missing.
  repeated EnvAccess env = 1;
}

// EnvAccess names a single host environment variable a hook needs.
message EnvAccess {
  // The env var being requested by the hook. Must match the conventions
  // for valid POSIX environment-variable identifiers.
  string name = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[A-Za-z_][A-Za-z0-9_]*$",
    (buf.validate.field).required = true
  ];

  // A brief description of what this key is used for and why. Surfaced
  // when the var is missing so the user can correct the issue.
  string description = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];
}

// DependentDefinition declares a consumer kind that may depend on this
// kind, the hook file path(s) that run when such a dependency is
// rendered, and the JSON Schema describing the `params` the consumer
// must supply.
message DependentDefinition {
  // The consumer kind that may depend on this resource.
  string kind = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.pattern = "^[a-z][a-z0-9_-]*$",
    (buf.validate.field).required = true
  ];

  // Paths to hook files that run when a resource of `kind` declares a
  // dependency on this resource. At least one entry is required. Hooks
  // run in declaration order. Paths are resolved relative to the
  // enclosing kind.json file.
  repeated string paths = 2 [
    (buf.validate.field).repeated.min_items = 1,
    (buf.validate.field).repeated.items.string.min_len = 1
  ];

  // Path to the JSON Schema describing the `params` object that the
  // consumer must supply when declaring this dependency. Resolved
  // relative to the enclosing kind.json file.
  string params_path = 3 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];
}
