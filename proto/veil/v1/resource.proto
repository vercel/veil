syntax = "proto3";

package veil.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";

// Resource is a consumer's instantiation of a kind.
message Resource {
  // Standard metadata common to all resources.
  Metadata metadata = 1 [(buf.validate.field).required = true];

  // Resource-specific data validated against the kind's schema.
  google.protobuf.Struct spec = 2;

  // Other resources this one depends on. Each entry triggers the target
  // kind's `dependent` hook(s) against this resource's bundle during
  // render. See SPEC.md "Dependencies".
  repeated Dependency dependencies = 3;
}

// Dependency declares that this resource depends on another resource.
// The depended-on resource (target) authoritatively controls how this
// resource talks to it via the target's `dependent` hooks.
message Dependency {
  // The kind of the target resource.
  string kind = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];

  // The name of the target resource. The pair (kind, name) must resolve
  // to a resource in the catalog at render time.
  string name = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];

  // Arbitrary parameters the target's `dependent` hook receives. The
  // shape is defined by the target kind's matching dependents entry.
  google.protobuf.Struct params = 3;
}

// Metadata contains fields common to every resource.
message Metadata {
  // The name of this resource.
  string name = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];

  // Conditional overlays applied based on CEL expressions.
  repeated Overlay overlays = 2;

  // Source files that have been ejected for local override.
  repeated Override overrides = 3;

  // The name of the kind this resource instantiates. Must match a kind
  // present in one of the loaded registries.
  string kind = 4 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];
}

// Overlay is a conditional data merge applied before transforms.
message Overlay {
  // CEL expression evaluated against the render context.
  string match = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];

  // Path to the overlay file. Resolved relative to the resource file
  // that declares this overlay, or used as-is when absolute.
  string file = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];
}

// Override maps a kind source file to a local replacement.
message Override {
  // Path of the source file in the kind being replaced.
  string source = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];

  // Local path to the override file.
  string path = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];
}
