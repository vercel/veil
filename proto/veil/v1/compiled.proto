syntax = "proto3";

package veil.v1;

import "buf/validate/validate.proto";
import "veil/v1/config.proto";

// CompiledKind is the compiled output of `veil build` for a single kind. It
// bundles every source file's contents and every hook's minified code into
// a single document, so rendering does not need access to the original
// filesystem.
message CompiledKind {
  // Name of the kind (matches Kind.name).
  string name = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];

  // Source files keyed by path relative to the kind directory. Values are
  // the raw file contents.
  map<string, string> sources = 2;

  // Compiled hooks grouped by lifecycle point (matches Kind.hooks).
  CompiledHooks hooks = 3;

  // Input variable declarations copied from veil.json. Consumers resolve
  // values from --var flags, VEIL_VAR_* env vars, or the declared default.
  map<string, Variable> variables = 4;
}

// CompiledHooks mirrors Kind.Hooks but holds compiled/bundled hook entries
// rather than paths.
message CompiledHooks {
  // Compiled hooks that run during `veil render`, in declaration order.
  repeated CompiledHook render = 1;
}

// CompiledRegistry is the top-level index written to <out>/registry.json by
// `veil build`. It maps kind name → entry describing how to find that kind's
// compiled artifacts. Consumers (e.g. `veil render`) read this to discover
// which kinds are available in a build artifact.
message CompiledRegistry {
  // Kind name → entry pointing at the compiled kind document and its schema.
  // All paths are resolved against the registry.json's own directory.
  map<string, CompiledRegistryEntry> kinds = 1;
}

// CompiledRegistryEntry describes a single kind in a CompiledRegistry.
message CompiledRegistryEntry {
  // Name of the kind (matches the map key and CompiledKind.name).
  string name = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];

  // Relative path to the compiled kind.json (e.g. "./worker/kind.json").
  string path = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];

  // Relative path to the kind's composite resource schema
  // (e.g. "./worker/kind.schema.json").
  string schema = 3 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];
}

// CompiledHook is a single hook bundled and minified from its TS/JS source,
// with all of its imports resolved and inlined.
message CompiledHook {
  // Relative path from the kind directory (e.g. "hooks/hello-world.ts").
  string name = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];

  // Minified JavaScript bundle, ES module format.
  string content = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true
  ];
}
